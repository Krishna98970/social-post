<!DOCTYPE html>
<html lang="en">
<head>
    <title>3D Login</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .card {
            width: 350px;
            padding: 30px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transform: perspective(1000px) rotateX(5deg) rotateY(5deg);
            transition: 0.4s;
        }

        .card:hover {
            transform: perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1.05);
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        label {
            color: white;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: none;
            border-radius: 10px;
            outline: none;
            background: rgba(255,255,255,0.2);
            color: white;
            transition: 0.3s;
        }

        input:focus {
            background: rgba(255,255,255,0.4);
            transform: scale(1.05);
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: #00c6ff;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0072ff;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .message {
            color: lightgreen;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="message">
        {{ message | default('') }}
    </div>

    <h1>Login</h1>

    <form method="post" action="/login">
        <label>Username</label>
        <input type="text" name="username" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
